{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'detection.css' %}" type="text/css"/>
    <title>Diabetes Detection System</title>
    <script>
        function validateNumberInput(event) {
            // Check if the value is a valid number
            if (isNaN(event.target.value) || event.target.value === '') {
                event.target.setCustomValidity("Please enter a valid numeric value.");
            } else {
                event.target.setCustomValidity("");
            }
        }
    </script>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="background-image" style="background-image: url('{% static "diabetes.jpeg" %}');">

        <div class="container">
            <h1>Diabetes Detection System</h1>
            <form id="diabetes-form" action="{% url 'result' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="pregnancies">Number of Pregnancies:</label>
                    <input type="number" id="pregnancies" name="pregnancies" min="0" max="20" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="glucose">Glucose Level:</label>
                    <input type="number" id="glucose" name="glucose" min="0" max="300" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="blood_pressure">Blood Pressure (mm Hg):</label>
                    <input type="number" id="blood_pressure" name="blood_pressure" min="0" max="200" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="skin_thickness">Skin Thickness (mm):</label>
                    <input type="number" id="skin_thickness" name="skin_thickness" min="0" max="100" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="insulin">Insulin Level (µU/ml):</label>
                    <input type="number" id="insulin" name="insulin" min="0" max="900" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="bmi">Body Mass Index (BMI):</label>
                    <input type="number" id="bmi" name="bmi" step="0.1" min="0" max="70" required oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="diabetes_pedigree_function">Diabetes Pedigree Function:</label>
                    <input type="number" id="diabetes_pedigree_function" name="diabetes_pedigree_function" step="0.001" min="0.0" max="2.5" required placeholder="e.g., 0.543" oninput="validateNumberInput(event)">
                </div>
                <div class="form-group">
                    <label for="age">Age (years):</label>
                    <input type="number" id="age" name="age" min="1" max="120" required oninput="validateNumberInput(event)">
                </div>
                <button type="submit" class="submit-btn">Get Prediction</button>
            </form>
        </div>
    </div>
</body>
</html>
